# Minutes-scale CPU smoke test of the full pipeline (small ensembles, short training).
# Use default.yaml for real experiments.

seed: 0
device: cpu
action_type: wilson

data:
  out_dir: artifacts/diffusion/smoke/data
  rungs:
    - {beta: 1.0, lattice_size: 16}
    - {beta: 2.0, lattice_size: 16}
    - {beta: 4.0, lattice_size: 16}
  heldout: []
  n_configs: 256
  n_chains: 16
  burn_in: 150
  thin: 4
  hmc_steps: 5
  hmc_step_size: 0.2
  topological_updates: true
  hot_start: true

train:
  epochs: 16
  batch_size: 16
  learning_rate: 4.0e-4
  sigma_min: 0.03
  sigma_max: 6.0
  hidden: 48
  depth: 3
  kernel_size: 3
  val_fraction: 0.1
  checkpoint: artifacts/diffusion/smoke/checkpoints/score_net.pt
  history: artifacts/diffusion/smoke/checkpoints/history.json

ladder:
  base: {beta: 1.0, lattice_size: 8}
  n_base_configs: 128
  beta_schedule: [4.0, 16.0]
  n_retherm_sweeps: 8
  retherm_topological_updates: true
  n_sampler_steps: 150
  n_corrector_steps: 1
  sample_batch_size: 32
  out_dir: artifacts/diffusion/smoke/generated

validate:
  out_dir: artifacts/diffusion/smoke/validation
  n_reference_configs: 256
  freezing_rung: {beta: 16.0, lattice_size: 32}
  freezing_hmc_length: 300
